<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard</title>

    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Style CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area"><i class="fas fa-cube"></i><span>Dashboard</span></div>
            <div class="nav-menu">
                <div class="nav-item active" data-view="dashboard"><i class="fas fa-th-large"></i><span>Dashboard</span>
                </div>
                <div class="nav-item" data-view="analytics"><i class="fas fa-chart-line"></i><span>Analytics</span>
                </div>
                <div class="nav-item" data-view="orders"><i class="fas fa-wallet"></i><span>Orders</span></div>
            </div>
            <div class="bottom-sidebar">
                <div class="user-info">
                    <div class="user-avatar"
                        style="background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        VG</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div class="page-title">
                    <h1>Main Dashboard</h1>
                    <p>Welcome back, Vivek</p>
                </div>
                <div class="date-badge" id="liveDate"></div>
            </div>

            <div class="cards-grid">
                <div class="stat-card">
                    <div class="card-icon"><i class="fas fa-bolt"></i></div>
                    <div class="card-value">$48,293</div>
                    <div class="card-label">Monthly Revenue</div>
                </div>
                <div class="stat-card">
                    <div class="card-icon"><i class="fas fa-eye"></i></div>
                    <div class="card-value">12.4k</div>
                    <div class="card-label">Visits</div>
                </div>
                <div class="stat-card">
                    <div class="card-icon"><i class="fas fa-shopping-cart"></i></div>
                    <div class="card-value">342</div>
                    <div class="card-label">New Sales</div>
                </div>
            </div>

            <div class="data-section">
                <div class="chart-card">
                    <h3>Weekly Activity</h3>
                    <div id="barChartContainer"
                        style="display:flex; align-items:flex-end; height:150px; gap:10px; margin-top:20px;"></div>
                </div>
                <div class="activity-card">
                    <h3>Recent Events</h3>
                    <div id="activityFeed" style="margin-top:1rem;"></div>
                </div>
            </div>

            <div class="recent-table-section">
                <h3>Transaction History</h3>
                <table id="ordersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Script JS -->
    <script src="./assets/js/script.js"></script>
</body>

</html>
