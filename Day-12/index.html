<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <!-- Style CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <div class="container">
        <h2>Password Generator</h2>

        <div class="output">
            <input type="text" id="password" readonly>
            <button onclick="copyPassword()">Copy</button>
        </div>

        <div class="row">
            <label>Password Length: <span id="lengthValue">8</span></label>
        </div>
        <input type="range" min="4" max="20" value="8" id="length">

        <div class="row">
            <label>Uppercase</label>
            <input type="checkbox" id="upper" checked>
        </div>

        <div class="row">
            <label>Lowercase</label>
            <input type="checkbox" id="lower" checked>
        </div>

        <div class="row">
            <label>Numbers</label>
            <input type="checkbox" id="number" checked>
        </div>

        <div class="row">
            <label>Symbols</label>
            <input type="checkbox" id="symbol">
        </div>

        <button class="btn" onclick="generatePassword()">Generate Password</button>

        <div class="strength">
            <div id="strengthBar" class="strength-bar"></div>
        </div>
    </div>

    <!-- Script JS -->
    <script src="./assets/js/script.js"></script>
</body>

</html>
