<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>

    <!-- Style CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <div class="slider">
        <div class="slides" id="slides">
            <img src="https://media.licdn.com/dms/image/v2/D4E12AQEbTVY4H18JYA/article-cover_image-shrink_720_1280/article-cover_image-shrink_720_1280/0/1715155566416?e=2147483647&v=beta&t=ytYXA5cl8Ef1vgqgp8PYVF77_v7dTyHi1PcbUeQcDws" />
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoSXFMRnxSwJJovj5h-mLfx2kqvrTMIJrjlg&s" />
            <img src="https://miro.medium.com/v2/resize:fit:1400/1*iIcA72937S0WOOjhmj0y4g.png" />
            <img src="https://www.spaceotechnologies.com/wp-content/uploads/2021/11/types-of-web-development.png" />
            <img src="https://www.guvi.in/blog/wp-content/uploads/2024/10/image_73176-1.webp" />
            <img src="https://i0.wp.com/weqtechnologies.com/wp-content/uploads/2025/07/front-end-keys.png?fit=1024%2C576&ssl=1" />
        </div>

        <button class="btn prev" onclick="prevSlide()">❮</button>
        <button class="btn next" onclick="nextSlide()">❯</button>
    </div>

    <!-- Script JS -->
    <script src="./assets/js/script.js"></script>
</body>

</html>
