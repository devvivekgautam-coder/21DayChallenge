<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form Validation</title>

    <!-- Style CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login', this)">Login</div>
            <div class="tab" onclick="switchTab('signup', this)">Sign Up</div>
        </div>

        <!-- LOGIN -->
        <div class="form active" id="login">
            <div class="input-box">
                <input type="email" id="loginEmail" placeholder=" ">
                <label>Email</label>
            </div>
            <div class="error" id="loginEmailError"></div>

            <div class="input-box">
                <input type="password" id="loginPass" placeholder=" ">
                <label>Password</label>
                <i class="fa-solid fa-eye toggle-pass" onclick="togglePass('loginPass')"></i>
            </div>
            <div class="error" id="loginPassError"></div>

            <button onclick="login()">Login</button>
        </div>

        <!-- SIGNUP -->
        <div class="form" id="signup">
            <div class="input-box">
                <input type="text" id="name" placeholder=" ">
                <label>Full Name</label>
            </div>
            <div class="error" id="nameError"></div>

            <div class="input-box">
                <input type="email" id="email" placeholder=" ">
                <label>Email</label>
            </div>
            <div class="error" id="emailError"></div>

            <div class="input-box">
                <input type="password" id="password" placeholder=" " oninput="checkStrength()">
                <label>Password</label>
                <i class="fa-solid fa-eye toggle-pass" onclick="togglePass('password')"></i>
            </div>

            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>

            <div class="input-box">
                <input type="password" id="confirm" placeholder=" ">
                <label>Confirm Password</label>
            </div>
            <div class="error" id="confirmError"></div>

            <button onclick="signup()">Create Account</button>
        </div>

    </div>

    <!-- Script JS -->
    <script src="./assets/js/script.js"></script>
</body>

</html>
