<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — CineStream</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>

<body>

  <!-- Navbar -->
  <nav id="navbar" class="scrolled">
    <a href="./assets/index.html" class="nav-logo">CINESTREAM</a>
    <ul class="nav-links">
      <li><a href="./assets/index.html" class="nav-link">Home</a></li>
      <li><a href="./assets/search.html" class="nav-link active">Browse</a></li>
      <li><a href="./assets/mylist.html" class="nav-link">My List</a></li>
    </ul>
    <div class="nav-right">
      <div class="nav-icon">U</div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div id="mobile-menu">
    <a href="./assets/index.html" class="mobile-link">🏠 Home</a>
    <a href="./assets/search.html" class="mobile-link">🔍 Browse</a>
    <a href="./assets/mylist.html" class="mobile-link">📋 My List</a>
  </div>

  <div class="search-page" id="search-results-container">

    <div class="search-hero">
      <h1>Browse Everything</h1>
      <div class="search-box">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search movies, shows, genres...">
        </div>
        <div id="suggestions"></div>
      </div>
    </div>

    <!-- Genre Chips -->
    <div class="genre-section">
      <h3>Browse by Genre</h3>
      <div class="genre-chips" id="genre-chips"></div>
    </div>

    <!-- Results -->
    <div class="results-section">
      <div class="results-header">
        <h2 id="results-title">🔥 Trending Now</h2>
        <span id="result-count"></span>
      </div>
      <div id="search-results"></div>
      <div id="scroll-sentinel" style="height:20px;margin-top:20px"></div>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-bottom">
      <span>© 2024 CineStream</span>
      <span>Powered by <a href="https://www.themoviedb.org" target="_blank" style="color:var(--red)">TMDB</a></span>
    </div>
  </footer>

  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/search.js"></script>
</body>

</html>
